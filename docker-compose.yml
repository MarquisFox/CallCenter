version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    networks:
      - backend
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    ports:
      - "${ZOOKEEPER_PORT}:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - backend

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "${KAFKA_PORT}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CREATE_TOPICS: >-
        call.registration:3:1,
        transcription.completed:3:1,
        tonality.analysis.input:3:1,
        tonality.analysis.output:3:1,
        recommendation.analysis.input:3:1,
        recommendation.analysis.output:3:1,
        call.registration-dlq:1:1,
        tonality.analysis.output-dlq:1:1,
        recommendation.analysis.output-dlq:1:1
    networks:
      - backend
    healthcheck:
      test: [ "CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list" ]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    networks:
      - backend
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  bitrixadapterservice:
    build:
      context: ./bitrixadapterservice
      dockerfile: Dockerfile
    container_name: bitrixadapterservice
    ports:
      - "${BITRIX_ADAPTER_PORT:-8081}:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BROKER}
      STATISTICS_SERVICE_URL: ${STATISTICS_INTERNAL_URL}
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - backend

  statisticservice:
    build:
      context: ./statisticservice
      dockerfile: Dockerfile
    container_name: statisticservice
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BROKER}
      CALL_REGISTRATION_TOPIC: ${CALL_REGISTRATION_TOPIC}
      TONALITY_OUTPUT_TOPIC: ${TONALITY_OUTPUT_TOPIC}
      RECOMMENDATION_OUTPUT_TOPIC: ${RECOMMENDATION_OUTPUT_TOPIC}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      RETRY_MAX_ATTEMPTS: ${RETRY_MAX_ATTEMPTS}
      RETRY_BACKOFF_MS: ${RETRY_BACKOFF_MS}
      RETRY_BACKOFF_MULTIPLIER: ${RETRY_BACKOFF_MULTIPLIER}
      RETRY_MAX_DELAY_MS: ${RETRY_MAX_DELAY_MS}
      DLQ_TOPIC_CALL_REGISTRATION: ${DLQ_TOPIC_CALL_REGISTRATION}
      DLQ_TOPIC_TONALITY_OUTPUT: ${DLQ_TOPIC_TONALITY_OUTPUT}
      DLQ_TOPIC_GIGACHAT_OUTPUT: ${DLQ_TOPIC_GIGACHAT_OUTPUT}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend

  tonalityservice:
    build:
      context: ./tonalityservice
      dockerfile: Dockerfile
    container_name: tonalityservice
    environment:
      KAFKA_BROKER: ${KAFKA_BROKER}
      INPUT_TOPIC: ${TONALITY_INPUT_TOPIC}
      OUTPUT_TOPIC: ${TONALITY_OUTPUT_TOPIC}
      TONALITY_MODEL_PATH: ${TONALITY_MODEL_PATH}
      RETRY_MAX_ATTEMPTS: ${RETRY_MAX_ATTEMPTS}
      RETRY_BACKOFF_MS: ${RETRY_BACKOFF_MS}
      RETRY_BACKOFF_MULTIPLIER: ${RETRY_BACKOFF_MULTIPLIER}
      DLQ_TOPIC: ${DLQ_TOPIC_TONALITY_OUTPUT}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_DB: ${REDIS_DB_TONALITY:-2}
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - backend

  recommendationservice:
    build:
      context: ./recommendationservice
      dockerfile: Dockerfile
    container_name: recommendationservice
    environment:
      KAFKA_BROKER: ${KAFKA_BROKER}
      INPUT_TOPIC: ${RECOMMENDATION_INPUT_TOPIC}
      OUTPUT_TOPIC: ${RECOMMENDATION_OUTPUT_TOPIC}
      GIGACHAT_API_KEY: ${GIGACHAT_API_KEY}
      CHECKLIST_ITEMS: ${CHECKLIST_ITEMS}
      RETRY_MAX_ATTEMPTS: ${RETRY_MAX_ATTEMPTS}
      RETRY_BACKOFF_MS: ${RETRY_BACKOFF_MS}
      RETRY_BACKOFF_MULTIPLIER: ${RETRY_BACKOFF_MULTIPLIER}
      DLQ_TOPIC: ${DLQ_TOPIC_GIGACHAT_OUTPUT}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_DB: ${REDIS_DB_RECOMMENDATION:-1}

    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - backend

  speechtotextservice:
    build:
      context: ./speech-to-textservice
      dockerfile: Dockerfile
    container_name: speechtotextservice
    environment:
      KAFKA_BROKER: ${KAFKA_BROKER}
      KAFKA_INPUT_TOPIC: ${SPEECH_INPUT_TOPIC}
      KAFKA_OUTPUT_TOPIC: ${SPEECH_OUTPUT_TOPIC}
      WHISPER_MODEL_SIZE: ${WHISPER_MODEL_SIZE}
      DLQ_TOPIC_STT: ${DLQ_TOPIC_STT}
      RETRY_MAX_ATTEMPTS: ${RETRY_MAX_ATTEMPTS}
      RETRY_BACKOFF_MS: ${RETRY_BACKOFF_MS}
      RETRY_BACKOFF_MULTIPLIER: ${RETRY_BACKOFF_MULTIPLIER}
      RETRY_MAX_DELAY_MS: ${RETRY_MAX_DELAY_MS}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_DB: ${REDIS_DB_STT:-0}
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - backend
networks:
  backend:
    driver: bridge

volumes:
  postgres_data: